<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechHub UERN - Dashboard de Oportunidades</title>
    <link rel="stylesheet" href="style.css">
    <!-- ADICIONE ISSO PARA OS ÍCONES -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- HEADER MEMPHIS INSPIRADO -->
    <header class="memphis-header">
        <!-- Padrão quadriculado de fundo -->
        <div class="memphis-grid-bg"></div>
        
        <!-- Formas geométricas decorativas inspiradas na imagem -->
        <div class="shape shape-circle"></div>
        <div class="shape shape-triangle"></div>

        <!-- Conteúdo do Header (Logotipo e Menu) -->
        <div class="header-container">
            <div class="logo">
                <span>TechHub UERN</span>
            </div>
        </div>
        
        <!-- Barra de busca com elementos geométricos -->
        <div class="busca-container-memphis">
            <input type="text" id="input-busca" placeholder="Pesquisar editais (ex: estágio, monitoria, TI)..." onkeyup="if(event.key === 'Enter') realizarPesquisa()">
            <button id="btn-pesquisar" onclick="realizarPesquisa()">
                <i class="ph ph-magnifying-glass"></i> Buscar
            </button>
            <!-- Botão Robô agora dentro da busca -->
            <button id="btn-buscar-tudo" onclick="acionarTodosOsRobos()" title="Raspar dados">
                <i class="ph ph-robot"></i>
            </button>
        </div>
    </header>

    <main>
        <!-- Seus botões de controle (sem emojis, só ícones) -->
        <div class="controles">
            <button id="btn-estagios" class="ativo" onclick="carregarDados('estagios')"><i class="ph ph-student"></i> Estágios (PRAE)</button>
            <button id="btn-bolsas" onclick="carregarDados('bolsas')"><i class="ph ph-coins"></i> Bolsas (PROEX)</button>
            <button id="btn-ufersa" onclick="carregarDados('ufersa')"><i class="ph ph-buildings"></i> Editais (UFERSA)</button>
            <button id="btn-ciee" onclick="carregarDados('ciee')"><i class="ph ph-briefcase"></i> Vagas (CIEE)</button>
            <button id="btn-portal_uern" onclick="carregarDados('portal_uern')"><i class="ph ph-graduation-cap"></i> Portal UERN</button>
            <button id="btn-noticias" onclick="carregarDados('noticias')"><i class="ph ph-lightning"></i> Notícias Tech</button>
            <button id="btn-analises" onclick="carregarEstatisticas()"><i class="ph ph-chart-bar"></i> Indicadores</button>
        </div>

        <div class="filtros-adicionais">
            <input type="checkbox" id="filtroVigentes" onchange="toggleFiltroVigentes()">
            <label for="filtroVigentes">Mostrar apenas vigentes</label>
        </div>

        <div id="container-vagas" class="grid-vagas">
            <p class="carregando">Carregando oportunidades do banco de dados...</p>
        </div>
    </main>

    <footer>
        <p>© TechHub UERN Mossoró | 2026 <span class="footer-lines"></span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
